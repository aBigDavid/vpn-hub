<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球优质高速机场评测推荐网</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #2b6cb0 0%, #1a365d 100%);
            --bg-gradient: linear-gradient(180deg, #edf2f7 0%, #cbd5e0 100%);
            --card-bg: #ffffff;
            --text-color: #2d3748;
            --text-muted: #718096;
            --border-color: #e2e8f0;
            --accent-orange: #dd6b20;
            --accent-green: #38a169;
            --discount-red: #e53e3e;
            --rating-blue: #1e3a8a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-color);
            line-height: 1.6;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.8);
            overflow: hidden;
        }

        .site-header {
            background: var(--primary-gradient);
            color: white;
            padding: 35px 30px;
            text-align: center;
            border-bottom: 4px solid #2b6cb0;
        }

        .site-header h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        .site-header p { font-size: 14px; opacity: 0.9; }

        .tabs-nav { display: flex; width: 100%; background: #f7fafc; border-bottom: 2px solid var(--border-color); }
        .tab-btn {
            flex: 1; text-align: center; padding: 16px 10px; cursor: pointer; font-weight: 600;
            color: var(--text-muted); transition: all 0.2s ease; text-decoration: none;
            border-bottom: 3px solid transparent; background: #f1f5f9; font-size: 15px;
        }

        input[type="radio"] { display: none; }
        #tab1:checked ~ .tabs-nav label[for="tab1"],
        #tab2:checked ~ .tabs-nav label[for="tab2"],
        #tab3:checked ~ .tabs-nav label[for="tab3"] {
            color: #2b6cb0; border-bottom: 3px solid #3182ce; background: var(--card-bg); font-weight: 700;
        }

        .tab-content { display: none; padding: 35px; }
        #tab1:checked ~ .content1, #tab2:checked ~ .content2, #tab3:checked ~ .content3 { display: block; }

        .discount-banner {
            background-color: var(--discount-red); color: #fff; padding: 18px; text-align: center;
            border-radius: 10px; margin-bottom: 25px; border: 2px solid #feb2b2;
            box-shadow: 0 4px 15px rgba(229, 62, 62, 0.2);
        }

        /* 大蓝色独立推荐框 + 闪烁白光阴影 */
        .rating-banner {
            background-color: var(--rating-blue);
            color: #ffffff;
            padding: 22px;
            text-align: center;
            border-radius: 10px;
            margin: 25px 0;
            border: 2px solid #3b82f6;
            animation: pulse-glow 2s infinite alternate;
        }

        .rating-banner h4 {
            font-size: 24px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .stars {
            font-size: 28px;
            color: #fbbf24;
            text-shadow: 0 0 12px rgba(251, 191, 36, 0.8);
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 4px 10px rgba(30, 58, 138, 0.3), 0 0 5px rgba(59, 130, 246, 0.2); }
            100% { box-shadow: 0 4px 20px rgba(30, 58, 138, 0.6), 0 0 15px rgba(59, 130, 246, 0.8); }
        }

        h2 { font-size: 20px; margin-bottom: 22px; color: #1a202c; font-weight: 700; border-left: 5px solid #3182ce; padding-left: 12px; }
        h3 { font-size: 17px; margin: 25px 0 12px 0; color: #2d3748; display: flex; align-items: center; gap: 8px; }

        .link-section {
            margin-bottom: 25px; background: #f8fafc; padding: 15px 20px;
            border-radius: 8px; border: 1px dashed #cbd5e0;
        }
        .link-section a { color: #3182ce; text-decoration: none; font-weight: 600; margin: 0 5px; }

        .notice-box {
            background-color: #f0fff4; border-left: 4px solid var(--accent-green);
            padding: 15px 20px; margin-bottom: 25px; border-radius: 4px; font-size: 14px; color: #22543d;
        }

        .feature-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 10px; }
        .feature-item {
            background: #fff; padding: 15px; border-radius: 8px; border: 1px solid var(--border-color);
            transition: transform 0.2s;
        }
        .feature-item:hover { transform: translateY(-2px); border-color: #3182ce; }
        .feature-title { font-weight: 700; font-size: 15px; margin-bottom: 5px; color: #2d3748; display: flex; align-items: center; gap: 6px; }
        .feature-desc { font-size: 13.5px; color: #4a5568; line-height: 1.5; }

        .speed-box {
            background: #1a202c; color: #edf2f7; border-radius: 10px; padding: 20px; margin-top: 15px;
            font-family: 'Courier New', Courier, monospace;
        }
        .speed-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #2d3748; }
        .speed-item:last-child { border-bottom: none; }
        .speed-item strong { color: #63b3ed; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 14px; text-align: left; font-size: 14px; border-bottom: 1px solid var(--border-color); }
